apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-devops-app

  template:
    metadata:
      labels:
        app: ai-devops-app

    spec:
      containers:
      - name: ai-devops-app
        image: ai-devops-app:v1
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "200m"